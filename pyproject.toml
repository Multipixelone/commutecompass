[project]
name = "commutecompass"
version = "0.1.0"
description = "NYC commute orchestrator"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.6",
  "click>=8.1",
  "google-api-python-client>=2.120",
  "google-auth-oauthlib>=1.2",
  "google-auth-httplib2>=0.2",
  "httpx>=0.27",
  "gtfs-realtime-bindings>=1.0",
  "pyyaml>=6.0",
  "rapidfuzz>=3.6",
  "tomli>=2.0",
  "tomlkit>=0.13",
]

[project.scripts]
commutecompass = "commutecompass.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/commutecompass"]
# Bundled GTFS stop tables consumed by commutecompass.realtime (generated by
# scripts/build_stops.py).  Hatchling includes non-.py files under the package
# by default, but pin it explicitly so a stray build config can't drop them.
artifacts = ["src/commutecompass/data/*.csv"]

[tool.hatch.build.targets.sdist]
include = [
  "src/commutecompass",
  "scripts/build_stops.py",
  "tests",
]
artifacts = ["src/commutecompass/data/*.csv"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
strict = true
python_version = "3.12"
mypy_path = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]

[tool.coverage.run]
source = ["commutecompass"]
branch = true

[tool.coverage.report]
# CI enforces a floor via --cov-fail-under; current coverage is ~87%.
show_missing = true
