# Home Assistant glue for the `commutecompass tomorrow` pull-model alarm.
#
# Architecture (zero-touch, unattended):
#
#   commutecompass tomorrow   --(POST script.commute_set_tomorrow_alarm)-->   HA
#                                                                              |
#                              writes input_datetime.commute_tomorrow_alarm <--+
#                                                                              |
#                                       iOS Shortcuts (daily 21:00 automation,
#                                       "Run Immediately") --(GET /api/states/
#                                       input_datetime.commute_tomorrow_alarm)
#                                                                              |
#                                                     creates an iOS alarm <---+
#
# Why the helper-then-poll split:
#   - commutecompass runs whenever it wants; the iPhone need not be awake.
#   - The Shortcut runs at a fixed local time so the alarm-creation step
#     happens on-device with the user logged in (no HA notify is allowed
#     to bypass iOS alarm restrictions otherwise).
#   - HA carries the value through the gap. input_datetime survives restarts.
#
# Install:
#   1. Append the `input_datetime:` block to your configuration.yaml
#      (or to whichever file your `input_datetime:` package lives in).
#   2. Append the `script:` block to your scripts.yaml.
#   3. Reload helpers + scripts (Developer Tools → YAML).
#   4. Configure commutecompass:
#        [home_assistant.tomorrow]
#        enabled = true
#        script  = "script.commute_set_tomorrow_alarm"
#   5. Build the iOS Shortcut (recipe at the bottom of this file).

# ─── 1. The helper that holds tomorrow's wake time ──────────────────────────
input_datetime:
  commute_tomorrow_alarm:
    name: Commute — tomorrow alarm
    has_date: true
    has_time: true

# ─── 2. The script commutecompass calls ─────────────────────────────────────
# NB: the input field is `alarm_at`, not `datetime`. Home Assistant's
# Jinja namespace exposes the Python `datetime` module under that name,
# so a field called `datetime` is silently shadowed and `{{ datetime }}`
# renders as the module repr — which `input_datetime.set_datetime` rejects
# with HTTP 400.
script:
  commute_set_tomorrow_alarm:
    alias: Commute — set tomorrow alarm
    description: >-
      Receives a single `alarm_at` variable (ISO-8601, NYC-local with offset)
      from `commutecompass tomorrow` and stores it in
      input_datetime.commute_tomorrow_alarm. The iOS Shortcut polls that
      helper later and creates the on-device alarm.
    mode: single
    fields:
      alarm_at:
        description: ISO-8601 datetime to wake up at.
        example: "2026-05-26T05:42:00-04:00"
        required: true
        selector:
          text:
    sequence:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.commute_tomorrow_alarm
        data:
          datetime: "{{ alarm_at }}"

# ─── 3. iOS Shortcuts recipe (build by hand in the Shortcuts app) ───────────
#
# Automation: "Time of Day", 21:00, Daily, Run Immediately = on.
# Actions:
#   1. Get Contents of URL
#        URL:    https://<your-ha-host>/api/states/input_datetime.commute_tomorrow_alarm
#        Method: GET
#        Headers:
#          Authorization: Bearer <Long-Lived Access Token from HA>
#   2. Get Dictionary Value
#        Key: state
#        From: Contents of URL
#   3. Get Dictionary Value (optional — for a sanity-check notification)
#        Key: last_changed
#   4. If <Dictionary Value 'state'> contains "T":
#        a. Get Date from Input — Date Format: ISO 8601, Time Format: ISO 8601
#        b. Create Alarm
#             Time: Date from step 4a
#             Label: "commute"
#             Snooze: off
#        c. (optional) Show Notification "Alarm set for <Date>"
#      Otherwise:
#        Show Notification "No commute alarm — empty state"
#
# Notes:
#   - The Shortcut needs network access to your HA host; if you're remote,
#     point it at your Nabu Casa / external URL instead of .local.
#   - Recreating an alarm with the same label silently replaces the old one
#     on iOS, so re-running the Shortcut is safe.
#   - If commutecompass pushed no value today (no commutes), the helper's
#     state will be "unknown" / not contain "T" and the Shortcut branch
#     above leaves yesterday's alarm in place.
