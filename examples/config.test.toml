[origin]
address = "123 Example Ave, Brooklyn, NY 11201"
lat = 40.6950
lon = -73.9890
subway_station = "Jay St-MetroTech"
lirr_station = "Atlantic Terminal"

[prep]
prep_minutes = 20
safety_buffer_minutes = 5

[scheduling]
morning_run_time = "06:00"
poll_interval_seconds = 60
quiet_hours_start = "22:00"
quiet_hours_end = "07:00"

[paths]
venues_file = "data/known_venues.yaml"
db_path = ".tmp/commutecop-test/state.db"
oauth_token_path = ".tmp/commutecop-test/google_token.json"

[opencode_go]
endpoint = "http://127.0.0.1:9999/v1/chat/completions"
