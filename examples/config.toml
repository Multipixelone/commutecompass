[origin]
address = "123 Example Ave, Brooklyn, NY 11201"
lat = 40.6950
lon = -73.9890
subway_station = "Jay St-MetroTech"
lirr_station = "Atlantic Terminal"

[prep]
prep_minutes = 20
safety_buffer_minutes = 5

[scheduling]
morning_run_time = "06:00"
poll_interval_seconds = 60
quiet_hours_start = "22:00"
quiet_hours_end = "07:00"

[paths]
venues_file = "/etc/commutecompass/known_venues.yaml"
db_path = "/var/lib/commutecompass/state.db"
oauth_token_path = "/var/lib/commutecompass/google_token.json"

[opencode_go]
endpoint = "https://opencode-go.example/v1/chat/completions"
model = "deepseek-v4-flash"

[mta]
subway_alerts_url = "https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/camsys%2Fsubway-alerts"
lirr_alerts_url = "https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/camsys%2Flirr-alerts"
bus_alerts_url = "https://gtfsrt.prod.obanyc.com/alerts"

[[calendars]]
id = "theatre-calendar@example.com"
name = "Theatre"

[[calendars]]
id = "school-calendar@example.com"
name = "School"

[[calendars]]
id = "noreply@example.com"
name = "Example User"

[[calendars]]
id = "parties-calendar@example.com"
name = "Parties"

[[calendars]]
id = "job-calendar@example.com"
name = "Job"

# ── Location Overrides ─────────────────────────────────────────────────────────
# Map events from specific calendars to a fixed destination, bypassing
# placeholder/LLM resolution. Useful when a calendar always meets at the
# same location even if the event text says "Location available once RSVP'd".
#
# [[location_overrides]]
# calendar_id = "job-calendar@example.com"
# location = "200 Example St, New York, NY 10001"
# # title_contains is optional — omit to override ALL events in that calendar.
# # title_contains = "Office Hours"
