# ── Notification mode ─────────────────────────────────────────────────────────
# "stdout" (default): each would-be Telegram message is printed to stdout with
#   ===COMMUTECOMPASS-MSG=== ... ===COMMUTECOMPASS-END=== markers. Pipe through
#   contrib/openclaw-send.sh to relay via your OpenClaw bot. TELEGRAM_BOT_TOKEN
#   and TELEGRAM_CHAT_ID are unused in this mode.
# "telegram":         POST directly to the Telegram Bot API (legacy single-bot
#   deployment). Requires TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID in the env.
[notify]
mode = "stdout"

[origin]
address = "123 Example Ave, Brooklyn, NY 11201"
lat = 40.6950
lon = -73.9890
subway_station = "Jay St-MetroTech"
lirr_station = "Atlantic Terminal"

[prep]
prep_minutes = 20
safety_buffer_minutes = 5

[scheduling]
morning_run_time = "06:00"
poll_interval_seconds = 60
quiet_hours_start = "22:00"
quiet_hours_end = "07:00"

[paths]
venues_file = "/etc/commutecompass/known_venues.yaml"
db_path = "/var/lib/commutecompass/state.db"
oauth_token_path = "/var/lib/commutecompass/google_token.json"

[opencode_go]
endpoint = "https://opencode-go.example/v1/chat/completions"
model = "deepseek-v4-flash"

[mta]
subway_alerts_url = "https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/camsys%2Fsubway-alerts"
lirr_alerts_url = "https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/camsys%2Flirr-alerts"
bus_alerts_url = "https://gtfsrt.prod.obanyc.com/alerts"

# ── Home Assistant integration (optional) ─────────────────────────────────────
# When enabled, each poll-tick pulls the device_tracker entity's latest state
# from Home Assistant. If that location is fresher than max_age_minutes and the
# tracker is not in the home_zone, planning uses it as the trip origin instead
# of [origin] above. Within replan_window_minutes of an event's leave time, the
# poll job also re-plans against the live location and pushes a Telegram update
# if the route shifts by ≥ 5 min. Requires HOME_ASSISTANT_TOKEN in the env.
[home_assistant]
enabled = false
base_url = "http://homeassistant.local:8123"
entity_id = "device_tracker.example_iphone"
home_zone = "home"
max_age_minutes = 30
replan_window_minutes = 30

[[calendars]]
id = "theatre-calendar@example.com"
name = "Theatre"

[[calendars]]
id = "school-calendar@example.com"
name = "School"

[[calendars]]
id = "personal-calendar@example.com"
name = "Example User"

[[calendars]]
id = "parties-calendar@example.com"
name = "Parties"

[[calendars]]
id = "job-calendar@example.com"
name = "Job"

# ── Location Overrides ─────────────────────────────────────────────────────────
# Map events from specific calendars to a fixed destination, bypassing
# placeholder/LLM resolution. Useful when a calendar always meets at the
# same location even if the event text says "Location available once RSVP'd".
#
[[location_overrides]]
calendar_id = "job-calendar@example.com"
location = "200 Example St, New York, NY 10001"
# # title_contains is optional — omit to override ALL events in that calendar.
# # title_contains = "Office Hours"
