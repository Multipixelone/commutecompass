# ── Notification mode ─────────────────────────────────────────────────────────
# "stdout" (default): each would-be Telegram message is printed to stdout with
#   ===COMMUTECOMPASS-MSG=== ... ===COMMUTECOMPASS-END=== markers. Pipe through
#   contrib/openclaw-send.sh to relay via your OpenClaw bot. TELEGRAM_BOT_TOKEN
#   and TELEGRAM_CHAT_ID are unused in this mode.
# "telegram":         POST directly to the Telegram Bot API (legacy single-bot
#   deployment). Requires TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID in the env.
[notify]
mode = "stdout"

[origin]
address = "123 Example Ave, Brooklyn, NY 11201"
lat = 40.6950
lon = -73.9890
subway_station = "Jay St-MetroTech"
lirr_station = "Atlantic Terminal"

[prep]
prep_minutes = 20
safety_buffer_minutes = 5

[scheduling]
morning_run_time = "06:00"
poll_interval_seconds = 60
quiet_hours_start = "22:00"
quiet_hours_end = "07:00"

[paths]
venues_file = "/etc/commutecompass/known_venues.yaml"
db_path = "/var/lib/commutecompass/state.db"
oauth_token_path = "/var/lib/commutecompass/google_token.json"

[opencode_go]
endpoint = "https://opencode-go.example/v1/chat/completions"
model = "deepseek-v4-flash"

[mta]
subway_alerts_url = "https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/camsys%2Fsubway-alerts"
lirr_alerts_url = "https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/camsys%2Flirr-alerts"
bus_alerts_url = "https://gtfsrt.prod.obanyc.com/alerts"

# ── Home Assistant integration (optional) ─────────────────────────────────────
# When enabled, each poll-tick pulls the tracker entity's latest state from HA.
# If the fix is fresh and accurate enough:
#   - state matches a [[home_assistant.zone_origins]] entry → that origin is
#     used (with its subway/LIRR hints)
#   - state matches home_zone → [origin] above is used
#   - otherwise → the live GPS coords are used as the trip origin
# Within replan_window_minutes of an event's leave time the poll job re-plans
# against the live location and pushes a Telegram update if the route shifts
# by ≥ 5 min. Requires HOME_ASSISTANT_TOKEN in the env.
#
# `entity_id` may be either a `device_tracker.*` or a `person.*` — both expose
# `state` + `attributes.latitude/longitude`. `person.*` is recommended because
# it aggregates multiple device trackers under one entity.
#
# Calendar events whose location text exactly matches one of HA's zone
# friendly_names (case-insensitive) also short-circuit the geocoder — handy
# for recurring events at "Office", "Madison Theatre", etc.
[home_assistant]
enabled = false
base_url = "http://homeassistant.local:8123"
entity_id = "person.example"
home_zone = "home"
max_age_minutes = 30
replan_window_minutes = 30
# Reject GPS fixes whose reported accuracy is worse than this many metres.
# Set to 0 to disable the filter entirely.
min_gps_accuracy_meters = 500

# Per-zone origin overrides — when the tracker is in a matched zone, planning
# uses this Origin instead of the live GPS coords, so non-home zones still get
# subway/LIRR station hints just like the home origin.
#
# `zone` is compared case-insensitively against the HA zone's friendly_name.
# [[home_assistant.zone_origins]]
# zone = "work"
# address = "200 W Street, New York, NY"
# lat = 40.7346
# lon = -74.0055
# subway_station = "34 St-Penn Station"
#
# [[home_assistant.zone_origins]]
# zone = "cap21"
# address = "18 Bridge St, New York, NY"
# lat = 40.7062
# lon = -74.0124

# ── Home Assistant alarm channel (optional, additive) ────────────────────────
# When enabled, each prep/leave ping ALSO POSTs to an HA service so HA can
# wake you up with a real alarm (Pushcut, looping critical notification,
# media_player on a HomePod — whatever you wire up inside HA itself).  The
# existing notify channel (Telegram/stdout) keeps firing as before; this is
# additive.  Reuses [home_assistant].base_url and HOME_ASSISTANT_TOKEN.
#
# `service` is the HA service to call as "domain.service".  Pointing at a
# script.* you own (rather than directly at notify.mobile_app_*) lets you
# evolve the alarm chain without touching commutecompass config.
#
# `extra_data` is merged into the JSON body POSTed to HA; use it to set
# Pushcut sound names, mobile_app critical-push flags, tags, etc.
# [home_assistant.alarm]
# enabled = true
# service = "script.commute_alarm"   # call your HA-side alarm script
# kinds = ["prep", "leave"]          # ping kinds that trigger the alarm
# [home_assistant.alarm.extra_data]
# # title = "Get moving!"           # overrides the default "CommuteCompass"
# # Example pass-through for HA Companion app critical push (iOS):
# # [home_assistant.alarm.extra_data.data.push.sound]
# # critical = 1
# # volume = 1.0
# # name = "alarm.caf"

[[calendars]]
id = "theatre-calendar@example.com"
name = "Theatre"

[[calendars]]
id = "school-calendar@example.com"
name = "School"

[[calendars]]
id = "personal-calendar@example.com"
name = "Example User"

[[calendars]]
id = "parties-calendar@example.com"
name = "Parties"

[[calendars]]
id = "job-calendar@example.com"
name = "Job"

# ── Location Overrides ─────────────────────────────────────────────────────────
# Map events from specific calendars to a fixed destination, bypassing
# placeholder/LLM resolution. Useful when a calendar always meets at the
# same location even if the event text says "Location available once RSVP'd".
#
[[location_overrides]]
calendar_id = "job-calendar@example.com"
location = "200 Example St, New York, NY 10001"
# # title_contains is optional — omit to override ALL events in that calendar.
# # title_contains = "Office Hours"
